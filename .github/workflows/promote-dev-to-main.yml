name: Promote Dev To Main

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

concurrency:
  group: promote-dev-to-main
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Verify branch setup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/branches/dev > /dev/null

      - name: Check whether dev is ahead of main
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ahead_by=$(gh api repos/${{ github.repository }}/compare/main...dev --jq '.ahead_by')
          echo "ahead_by=$ahead_by" >> "$GITHUB_OUTPUT"

          if [ "$ahead_by" = "0" ]; then
            echo "No new commits to promote from dev to main."
          fi

      - name: Verify dev checks pass
        if: success() && steps.compare.outputs.ahead_by != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dev_sha=$(gh api repos/${{ github.repository }}/branches/dev --jq '.commit.sha')

          failed=$(gh api repos/${{ github.repository }}/commits/$dev_sha/check-runs \
            --jq '[.check_runs[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled")] | length')

          if [ "$failed" != "0" ]; then
            echo "ERROR: $failed check(s) failed on dev HEAD ($dev_sha). Aborting promotion."
            exit 1
          fi

          echo "All checks on dev HEAD ($dev_sha) passed. Proceeding with promotion."

      - name: Merge dev into main
        if: success() && steps.compare.outputs.ahead_by != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! response=$(gh api repos/${{ github.repository }}/merges \
            --method POST \
            -f base=main \
            -f head=dev \
            -f commit_message="Promote dev to main" 2>&1); then
            if echo "$response" | grep -q "Merge conflict"; then
              echo "ERROR: Merge conflict detected between dev and main. Manual resolution required."
            else
              echo "ERROR: Merge failed: $response"
            fi
            exit 1
          fi

          echo "Successfully promoted dev to main."
